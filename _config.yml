# TTDB 博客配置
# 站点基本信息
title: TTDB
description: 一个极简但有创意的个人博客
author: HgnGoning
email: # 可选：你的邮箱
url: "https://hgngoning.github.io"
baseurl: ""

# 社交链接
github_username: HgnGoning

# 构建设置
markdown: kramdown
highlighter: rouge

# Kramdown 配置
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# 插件（GitHub Pages 支持）
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 时区
timezone: Asia/Shanghai

# 分页设置
paginate: 10
paginate_path: "/page:num/"

# 文章永久链接格式
permalink: /posts/:year/:month/:day/:title/

# 默认值
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "HgnGoning"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE

# 包含文件
include:
  - _pages

# 文章摘要长度
excerpt_words: 15

# 日记集合
collections:
  diaries:
    output: true
    permalink: /diary/:year/:month/:day/
